services:
  openclaw:
    image: rockylinux-openclaw:9
    container_name: openclaw-service
    command: ["openclaw", "gateway", "--bind", "auto"]
    
    # 端口映射：使用 .env 中的变量
    ports:
      - "${OPENCLAW_API_PORT:-18789}:18789"
      - "${OPENCLAW_CTRL_PORT:-18790}:18790"
    
    # 挂载卷：优先使用 .env 中的路径，若无则默认使用家目录
    volumes:
      - "${OPENCLAW_DATA_PATH:-~/.openclaw-rockylinux}:/home/node"
    
    # 交互模式支持 (对于 openclaw 这类可能需要交互的工具很重要)
    stdin_open: true
    tty: true
    
    # 自动重启策略
    restart: unless-stopped
    
    # 将 .env 中的环境变量传递给容器内部
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      # 如果 openclaw 程序本身支持读取环境变量，也可以在这里透传
      # - PORT=18789 